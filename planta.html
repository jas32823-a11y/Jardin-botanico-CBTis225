<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Información de Planta</title>

    <link rel="stylesheet" href="css/estilos.css" />
  </head>

  <body>
    <div class="contenedor">
      <h1 id="nombre"></h1>

      <img id="imagen" alt="Imagen de la planta"/>
      <p>
        <b>Nombre científico:</b>
        <span id="cientifico"></span>
      </p>

      <p>
        <b>Origen:</b>
        <span id="origen"></span>
      </p>

      <p>
        <b>Ubicación:</b>
        <span id="ubicacion"></span>
      </p>

      <h3>Usos</h3>

      <ul id="usos"></ul>

      <p id="descripcion"></p>
    </div>

    <script src="js/plantas.js"></script>
    <script src="js/planta.js"></script>
  </body>
</html>
